<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance & Investing 101 - Quiz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: rgba(15, 12, 41, 0.95);
            border: 3px solid #d4af37;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4), 0 0 100px rgba(48, 43, 99, 0.5);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
        }

        .screen {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== NAME ENTRY SCREEN ===== */
        .name-entry-screen {
            text-align: center;
            padding-top: 60px;
            padding-bottom: 60px;
        }

        .title {
            font-size: 3.5em;
            font-weight: bold;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.8), 0 0 40px rgba(212, 175, 55, 0.4);
            margin-bottom: 20px;
            letter-spacing: 2px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(212, 175, 55, 0.8), 0 0 40px rgba(212, 175, 55, 0.4); }
            to { text-shadow: 0 0 30px rgba(212, 175, 55, 1), 0 0 60px rgba(212, 175, 55, 0.6); }
        }

        .subtitle {
            font-size: 1.5em;
            color: #b8860b;
            margin-bottom: 30px;
        }

        .name-input-group {
            margin: 40px 0;
        }

        .name-input-group label {
            display: block;
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #d4af37;
        }

        .name-input-group input {
            width: 100%;
            max-width: 400px;
            padding: 15px 20px;
            font-size: 1.2em;
            border: 2px solid #d4af37;
            background: rgba(212, 175, 55, 0.1);
            color: white;
            border-radius: 10px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .name-input-group input:focus {
            outline: none;
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .start-button, .play-again-button {
            padding: 15px 40px;
            font-size: 1.2em;
            background: linear-gradient(45deg, #d4af37, #ffd700);
            color: #0f0c29;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
        }

        .start-button:hover, .play-again-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(212, 175, 55, 0.6);
            background: linear-gradient(45deg, #ffd700, #d4af37);
        }

        /* ===== GAME SCREEN ===== */
        .game-screen {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Duolingo-style progress bar */
        .progress-bar-container {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            margin-bottom: 40px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #d4af37, #ffd700);
            border-radius: 6px;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .question-text {
            font-size: 1.5em;
            margin: 0 0 30px 0;
            line-height: 1.6;
            color: #ffffff;
            font-weight: 500;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 0;
        }

        @media (max-width: 768px) {
            .options {
                grid-template-columns: 1fr;
            }
        }

        .option {
            padding: 20px;
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1em;
            font-weight: 500;
            position: relative;
        }

        .option:hover:not(.disabled) {
            background: rgba(212, 175, 55, 0.2);
            border-color: #d4af37;
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
        }

        .option.selected {
            background: rgba(212, 175, 55, 0.4);
            border-color: #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .option-label {
            display: inline-block;
            width: 30px;
            height: 30px;
            background: #d4af37;
            color: #0f0c29;
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            font-weight: bold;
            margin-right: 15px;
        }

        /* ===== LOADING SCREEN ===== */
        .loading-screen {
            text-align: center;
            padding: 60px 20px;
        }

        .loading-title {
            font-size: 2em;
            color: #d4af37;
            margin-bottom: 40px;
        }

        .loading-animation {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 40px;
        }

        .loading-ring {
            position: absolute;
            border-radius: 50%;
            border: 4px solid transparent;
            animation: spin 1.5s linear infinite;
        }

        .loading-ring:nth-child(1) {
            width: 200px; height: 200px;
            top: 0; left: 0;
            border-top-color: #d4af37;
            animation-duration: 1.5s;
        }
        .loading-ring:nth-child(2) {
            width: 160px; height: 160px;
            top: 20px; left: 20px;
            border-right-color: #ffd700;
            animation-duration: 2s;
            animation-direction: reverse;
        }
        .loading-ring:nth-child(3) {
            width: 120px; height: 120px;
            top: 40px; left: 40px;
            border-bottom-color: #b8860b;
            animation-duration: 1s;
        }

        .loading-emoji {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
        }

        .loading-text {
            font-size: 1.2em;
            color: #b8860b;
            animation: loadingDots 1.5s infinite;
        }

        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(3, end) infinite;
        }

        @keyframes dots {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }

        .loading-progress-bar {
            width: 80%;
            max-width: 400px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin: 30px auto 0;
            overflow: hidden;
        }

        .loading-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #d4af37, #ffd700, #d4af37);
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* ===== RESULTS SCREEN ===== */
        .results-screen {
            text-align: center;
        }

        .final-score {
            font-size: 2.5em;
            color: #d4af37;
            margin: 30px 0;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.8);
        }

        .rank-badge {
            font-size: 3em;
            margin: 30px 0;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .rank-title {
            font-size: 2em;
            color: #d4af37;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.8);
        }

        .rank-description {
            font-size: 1.2em;
            color: #b8860b;
            margin: 20px 0 40px 0;
            line-height: 1.6;
        }

        .stats {
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin: 30px 0;
            text-align: left;
        }

        .stat-item {
            margin: 10px 0;
            font-size: 1.1em;
        }

        .stat-label {
            color: #b8860b;
            font-weight: bold;
        }

        .stat-value {
            color: #4caf50;
            font-weight: bold;
        }

        /* Question review in results */
        .question-review {
            margin: 30px 0;
            text-align: left;
        }

        .question-review h3 {
            color: #d4af37;
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        .review-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 12px;
            border-left: 4px solid;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .review-item.review-correct {
            border-left-color: #4caf50;
        }

        .review-item.review-incorrect {
            border-left-color: #f44336;
        }

        .review-icon {
            font-size: 1.2em;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .review-content {
            flex: 1;
        }

        .review-question {
            font-weight: 500;
            margin-bottom: 4px;
            color: #eee;
        }

        .review-answer {
            font-size: 0.9em;
            color: #999;
        }

        .review-answer .correct-answer {
            color: #4caf50;
        }

        .celebration-text {
            font-size: 1.3em;
            color: #ffd700;
            margin: 20px 0;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Music toggle button */
        .music-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: #d4af37;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .music-toggle:hover {
            background: rgba(212, 175, 55, 0.3);
        }

        @media (max-width: 768px) {
            .title { font-size: 2em; }
            .subtitle { font-size: 1.1em; }
            .question-text { font-size: 1.2em; }
            .option { font-size: 1em; padding: 15px; }
            .final-score { font-size: 1.8em; }
            .rank-badge { font-size: 2em; }
            .rank-title { font-size: 1.5em; }
            .name-entry-screen { padding-top: 40px; padding-bottom: 40px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Music Toggle -->
        <button class="music-toggle" id="musicToggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

        <!-- Name Entry Screen -->
        <div class="screen active name-entry-screen" id="nameScreen">
            <h1 class="title">💰 WHO WANTS TO BE A MILLIONAIRE?</h1>
            <p class="subtitle">Personal Finance & Investing 101</p>
            <div class="name-input-group">
                <label for="playerName">Enter Your Name:</label>
                <input type="text" id="playerName" placeholder="Your name here..." maxlength="30">
            </div>
            <p style="color: #b8860b; font-size: 1em;">Test your knowledge about personal finance and investing!</p>
            <button class="start-button" onclick="startGame()">Start Game</button>
        </div>

        <!-- Game Screen -->
        <div class="screen game-screen" id="gameScreen">
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
            </div>
            <div class="question-text" id="questionText"></div>
            <div class="options" id="optionsContainer"></div>
        </div>

        <!-- Loading Screen -->
        <div class="screen loading-screen" id="loadingScreen">
            <div class="loading-title">Calculating Your Results...</div>
            <div class="loading-animation">
                <div class="loading-ring"></div>
                <div class="loading-ring"></div>
                <div class="loading-ring"></div>
                <div class="loading-emoji">💰</div>
            </div>
            <div class="loading-text" id="loadingText">Analyzing your answers...</div>
            <div class="loading-progress-bar">
                <div class="loading-progress-fill" id="loadingProgressFill"></div>
            </div>
        </div>

        <!-- Results Screen -->
        <div class="screen results-screen" id="resultsScreen">
            <h2 class="title">🎉 RESULTS</h2>
            <div class="celebration-text" id="celebrationText"></div>
            <div class="rank-badge" id="rankBadge"></div>
            <div class="rank-title" id="rankTitle"></div>
            <div class="rank-description" id="rankDescription"></div>
            <div class="final-score">Score: <span id="finalScore">0</span> / 14</div>
            <div class="stats">
                <div class="stat-item"><span class="stat-label">Questions Correct:</span> <span class="stat-value" id="questionsCorrect">0</span>/14</div>
                <div class="stat-item"><span class="stat-label">Accuracy:</span> <span class="stat-value" id="accuracy">0</span>%</div>
            </div>
            <div class="question-review" id="questionReview">
                <h3>Question Review</h3>
                <div id="reviewList"></div>
            </div>
            <button class="play-again-button" onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script>
        // Quiz Data
        const quizData = [
            {
                question: "Why do we need to save and invest?",
                options: [
                    "To buy luxury items now",
                    "To protect our future selves and build wealth",
                    "Because our parents told us to",
                    "To show off to friends"
                ],
                correct: 1
            },
            {
                question: "What are the two forms of capital that generate income?",
                options: [
                    "Cash and credit cards",
                    "Stocks and bonds",
                    "Human capital and financial capital",
                    "Gold and silver"
                ],
                correct: 2
            },
            {
                question: "What does 'inflation' do to your money over time?",
                options: [
                    "Makes it worth more",
                    "Keeps it the same",
                    "Reduces its purchasing power",
                    "Doubles it every year"
                ],
                correct: 2
            },
            {
                question: "In the 50/30/20 rule, what percentage goes to savings?",
                options: [
                    "50%",
                    "30%",
                    "10%",
                    "20%"
                ],
                correct: 3
            },
            {
                question: "What matters more than the exact percentage you save?",
                options: [
                    "Having a high income",
                    "Investing in individual stocks",
                    "Consistency",
                    "Timing the market"
                ],
                correct: 2
            },
            {
                question: "What is 'lifestyle inflation'?",
                options: [
                    "When prices go up due to government policy",
                    "When you increase spending every time your income goes up",
                    "When rent increases annually",
                    "When you buy a bigger house"
                ],
                correct: 1
            },
            {
                question: "What is a bond?",
                options: [
                    "Buying ownership in a company",
                    "Lending money to a government or company",
                    "A type of savings account",
                    "Insurance on your investments"
                ],
                correct: 1
            },
            {
                question: "What is the typical annual return of the S&P 500 historically?",
                options: [
                    "1-3%",
                    "3-5%",
                    "~10.5%",
                    "15-20%"
                ],
                correct: 2
            },
            {
                question: "What did Warren Buffett recommend as the best investment for most people?",
                options: [
                    "Individual tech stocks",
                    "Real estate",
                    "A low-cost S&P 500 index fund",
                    "Gold and silver"
                ],
                correct: 2
            },
            {
                question: "What is an index fund?",
                options: [
                    "A single company's stock",
                    "A fund that tracks hundreds of companies at once",
                    "A government bond",
                    "A high-interest savings account"
                ],
                correct: 1
            },
            {
                question: "Using the Rule of 72, if your return is 9%, how many years to double your money?",
                options: [
                    "6 years",
                    "8 years",
                    "9 years",
                    "12 years"
                ],
                correct: 1
            },
            {
                question: "In the tale of Wynter and Jonathan, why did Wynter end up with MORE money despite investing LESS?",
                options: [
                    "Wynter picked better stocks",
                    "Wynter started 10 years earlier, giving compound interest more time",
                    "Wynter invested in real estate",
                    "Jonathan had bad luck"
                ],
                correct: 1
            },
            {
                question: "If you invest $1,000 at 10.5% annual return, roughly how much will you have in 10 years?",
                options: [
                    "$1,700",
                    "$2,714",
                    "$3,500",
                    "$10,500"
                ],
                correct: 1
            },
            {
                question: "Which statement BEST summarizes the key lesson of compound interest?",
                options: [
                    "You need a lot of money to start investing",
                    "Time in the market beats timing the market — start early, even small",
                    "Only invest when the market is going up",
                    "Save all your money and never spend it"
                ],
                correct: 1
            }
        ];

        // Game State
        let currentQuestion = 0;
        let correctAnswers = 0;
        let playerAnswers = []; // store all answers: { selected, correct, isCorrect }
        let musicPlaying = false;
        let bgMusicNodes = null;

        // Audio
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // ===== BACKGROUND MUSIC =====
        function startBackgroundMusic() {
            if (bgMusicNodes) return;
            try {
                const now = audioContext.currentTime;
                const masterGain = audioContext.createGain();
                masterGain.gain.setValueAtTime(0.06, now);
                masterGain.connect(audioContext.destination);

                // Simple ambient loop using oscillators
                // Chord progression: Cmaj7 -> Am7 -> Fmaj7 -> G7 (looping)
                const chords = [
                    [261.63, 329.63, 392.00, 493.88],  // Cmaj7
                    [220.00, 261.63, 329.63, 392.00],  // Am7
                    [174.61, 220.00, 261.63, 329.63],  // Fmaj7
                    [196.00, 246.94, 293.66, 349.23],  // G7
                ];

                const loopDuration = 16; // 4 seconds per chord, 16s total
                let oscillators = [];

                function createLoop() {
                    const startTime = audioContext.currentTime;

                    chords.forEach((chord, ci) => {
                        chord.forEach((freq, fi) => {
                            const osc = audioContext.createOscillator();
                            const gain = audioContext.createGain();
                            osc.connect(gain);
                            gain.connect(masterGain);

                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(freq, startTime + ci * 4);

                            // Gentle fade in/out for each chord
                            gain.gain.setValueAtTime(0, startTime + ci * 4);
                            gain.gain.linearRampToValueAtTime(0.15, startTime + ci * 4 + 0.5);
                            gain.gain.setValueAtTime(0.15, startTime + ci * 4 + 3.2);
                            gain.gain.linearRampToValueAtTime(0, startTime + ci * 4 + 4);

                            osc.start(startTime + ci * 4);
                            osc.stop(startTime + ci * 4 + 4);
                            oscillators.push(osc);
                        });
                    });

                    // Also add a gentle high-register melody
                    const melodyNotes = [
                        { freq: 523.25, time: 0, dur: 1 },
                        { freq: 587.33, time: 1, dur: 1 },
                        { freq: 659.25, time: 2, dur: 1.5 },
                        { freq: 523.25, time: 4, dur: 1 },
                        { freq: 493.88, time: 5, dur: 1 },
                        { freq: 440.00, time: 6, dur: 1.5 },
                        { freq: 349.23, time: 8, dur: 1 },
                        { freq: 392.00, time: 9, dur: 1 },
                        { freq: 440.00, time: 10, dur: 1.5 },
                        { freq: 392.00, time: 12, dur: 1 },
                        { freq: 349.23, time: 13, dur: 1 },
                        { freq: 329.63, time: 14, dur: 1.5 },
                    ];

                    melodyNotes.forEach(note => {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(masterGain);

                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(note.freq, startTime + note.time);

                        gain.gain.setValueAtTime(0, startTime + note.time);
                        gain.gain.linearRampToValueAtTime(0.08, startTime + note.time + 0.1);
                        gain.gain.setValueAtTime(0.08, startTime + note.time + note.dur - 0.2);
                        gain.gain.linearRampToValueAtTime(0, startTime + note.time + note.dur);

                        osc.start(startTime + note.time);
                        osc.stop(startTime + note.time + note.dur);
                        oscillators.push(osc);
                    });
                }

                createLoop();
                const loopInterval = setInterval(() => {
                    if (!musicPlaying) {
                        clearInterval(loopInterval);
                        return;
                    }
                    oscillators = [];
                    createLoop();
                }, loopDuration * 1000);

                bgMusicNodes = { masterGain, loopInterval, oscillators };
                musicPlaying = true;
                document.getElementById('musicToggle').textContent = '🔊';
            } catch (e) {
                console.log('Background music failed:', e);
            }
        }

        function stopBackgroundMusic() {
            if (bgMusicNodes) {
                clearInterval(bgMusicNodes.loopInterval);
                bgMusicNodes.masterGain.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.5);
                setTimeout(() => {
                    try { bgMusicNodes.masterGain.disconnect(); } catch(e) {}
                    bgMusicNodes = null;
                }, 600);
            }
            musicPlaying = false;
            document.getElementById('musicToggle').textContent = '🔇';
        }

        function toggleMusic() {
            if (audioContext.state === 'suspended') audioContext.resume();
            if (musicPlaying) {
                stopBackgroundMusic();
            } else {
                startBackgroundMusic();
            }
        }

        // ===== SOUND EFFECTS =====
        function playSound(type) {
            try {
                if (audioContext.state === 'suspended') audioContext.resume();
                const now = audioContext.currentTime;

                if (type === 'select') {
                    // Soft click/select sound
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.frequency.setValueAtTime(600, now);
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
                    osc.start(now);
                    osc.stop(now + 0.12);
                } else if (type === 'loading') {
                    // Ascending pings during loading
                    for (let i = 0; i < 4; i++) {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.setValueAtTime(300 + (i * 150), now + i * 0.8);
                        osc.type = 'sine';
                        gain.gain.setValueAtTime(0.12, now + i * 0.8);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.8 + 0.3);
                        osc.start(now + i * 0.8);
                        osc.stop(now + i * 0.8 + 0.3);
                    }
                } else if (type === 'reveal') {
                    // Dramatic reveal sound
                    const osc = audioContext.createOscillator();
                    const osc2 = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    const gain2 = audioContext.createGain();
                    osc.connect(gain);
                    osc2.connect(gain2);
                    gain.connect(audioContext.destination);
                    gain2.connect(audioContext.destination);

                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(800, now + 0.6);
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                    osc.start(now);
                    osc.stop(now + 0.8);

                    osc2.frequency.setValueAtTime(300, now + 0.1);
                    osc2.frequency.exponentialRampToValueAtTime(1000, now + 0.7);
                    osc2.type = 'triangle';
                    gain2.gain.setValueAtTime(0.1, now + 0.1);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                    osc2.start(now + 0.1);
                    osc2.stop(now + 0.8);
                } else if (type === 'win') {
                    const frequencies = [523.25, 659.25, 783.99, 1046.50];
                    for (let i = 0; i < frequencies.length; i++) {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.setValueAtTime(frequencies[i], now + i * 0.2);
                        osc.type = 'sine';
                        gain.gain.setValueAtTime(0.2, now + i * 0.2);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.2 + 0.3);
                        osc.start(now + i * 0.2);
                        osc.stop(now + i * 0.2 + 0.3);
                    }
                } else if (type === 'drumroll') {
                    // Drumroll effect for loading screen
                    for (let i = 0; i < 30; i++) {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.setValueAtTime(80 + Math.random() * 40, now + i * 0.1);
                        osc.type = 'triangle';
                        const vol = 0.05 + (i / 30) * 0.15;
                        gain.gain.setValueAtTime(vol, now + i * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.08);
                        osc.start(now + i * 0.1);
                        osc.stop(now + i * 0.1 + 0.08);
                    }
                }
            } catch (e) {
                console.log('Audio not available');
            }
        }

        // ===== GAME FUNCTIONS =====
        function startGame() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) {
                alert('Please enter your name!');
                return;
            }

            // Resume audio context on user gesture
            if (audioContext.state === 'suspended') audioContext.resume();

            // Start background music
            startBackgroundMusic();

            document.getElementById('nameScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');

            currentQuestion = 0;
            correctAnswers = 0;
            playerAnswers = [];
            displayQuestion();
        }

        function displayQuestion() {
            if (currentQuestion >= quizData.length) {
                showLoadingScreen();
                return;
            }

            const q = quizData[currentQuestion];

            // Update progress bar
            const progress = (currentQuestion / quizData.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';

            document.getElementById('questionText').textContent = q.question;

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';

            q.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.onclick = () => selectAnswer(index);

                const label = document.createElement('span');
                label.className = 'option-label';
                label.textContent = String.fromCharCode(65 + index);

                optionDiv.appendChild(label);
                optionDiv.appendChild(document.createTextNode(option));
                container.appendChild(optionDiv);
            });
        }

        function selectAnswer(index) {
            const q = quizData[currentQuestion];
            const isCorrect = index === q.correct;

            // Play select sound
            playSound('select');

            // Record answer
            playerAnswers.push({
                questionIndex: currentQuestion,
                selected: index,
                correct: q.correct,
                isCorrect: isCorrect
            });

            if (isCorrect) correctAnswers++;

            // Brief highlight of selected option, then move on
            const options = document.querySelectorAll('.option');
            options.forEach((opt, i) => {
                opt.classList.add('disabled');
                if (i === index) {
                    opt.classList.add('selected');
                }
            });

            // Auto-advance after a short delay
            setTimeout(() => {
                currentQuestion++;
                displayQuestion();
            }, 400);
        }

        // ===== LOADING SCREEN =====
        function showLoadingScreen() {
            // Fill progress bar to 100%
            document.getElementById('progressBar').style.width = '100%';

            setTimeout(() => {
                document.getElementById('gameScreen').classList.remove('active');
                document.getElementById('loadingScreen').classList.add('active');

                // Play drumroll
                playSound('drumroll');

                const loadingTexts = [
                    'Analyzing your answers...',
                    'Calculating your score...',
                    'Comparing with Wall Street pros...',
                    'Determining your investor rank...',
                    'Almost there...'
                ];

                const progressFill = document.getElementById('loadingProgressFill');
                const textEl = document.getElementById('loadingText');
                let step = 0;
                const totalSteps = loadingTexts.length;
                const interval = 800; // each step duration

                const loadingInterval = setInterval(() => {
                    step++;
                    const pct = Math.min((step / totalSteps) * 100, 100);
                    progressFill.style.width = pct + '%';

                    if (step < totalSteps) {
                        textEl.textContent = loadingTexts[step];
                    }

                    if (step === 3) {
                        playSound('loading');
                    }

                    if (step >= totalSteps) {
                        clearInterval(loadingInterval);
                        // Play reveal sound and show results
                        setTimeout(() => {
                            playSound('reveal');
                            setTimeout(() => {
                                showResults();
                            }, 500);
                        }, 400);
                    }
                }, interval);
            }, 300);
        }

        // ===== RESULTS =====
        function getRank(score) {
            const pct = score / quizData.length;
            if (pct === 1) {
                return {
                    title: 'Warren Buffett Jr. 👑',
                    badge: '👑',
                    description: 'PERFECT SCORE! You are a financial genius! You\'ve mastered the concepts of personal finance and investing. With this knowledge, you\'re ready to build generational wealth!'
                };
            } else if (pct >= 0.85) {
                return {
                    title: 'Wall Street Wolf 🐺',
                    badge: '🐺',
                    description: 'You\'re a financial powerhouse! You understand compound interest, diversification, and long-term investing strategies.'
                };
            } else if (pct >= 0.65) {
                return {
                    title: 'Index Fund Investor 📈',
                    badge: '📈',
                    description: 'Great job! You have a solid understanding of investing fundamentals. Keep learning!'
                };
            } else if (pct >= 0.4) {
                return {
                    title: 'Savings Account Pro 🏦',
                    badge: '🏦',
                    description: 'Good start! You understand basic saving and budgeting. Keep learning about investing to grow your wealth faster!'
                };
            } else {
                return {
                    title: 'Piggy Bank Beginner 🐷',
                    badge: '🐷',
                    description: 'You\'re just starting your financial journey! Keep learning, and you\'ll become a money expert in no time!'
                };
            }
        }

        function showResults() {
            document.getElementById('loadingScreen').classList.remove('active');

            const rank = getRank(correctAnswers);
            const accuracy = Math.round((correctAnswers / quizData.length) * 100);

            document.getElementById('celebrationText').textContent =
                correctAnswers === quizData.length ? '🎊 PERFECT SCORE! 🎊' : 'Great effort!';
            document.getElementById('rankBadge').textContent = rank.badge;
            document.getElementById('rankTitle').textContent = rank.title;
            document.getElementById('rankDescription').textContent = rank.description;
            document.getElementById('finalScore').textContent = correctAnswers;
            document.getElementById('questionsCorrect').textContent = correctAnswers;
            document.getElementById('accuracy').textContent = accuracy;

            // Build question review
            const reviewList = document.getElementById('reviewList');
            reviewList.innerHTML = '';

            playerAnswers.forEach((ans, i) => {
                const q = quizData[ans.questionIndex];
                const item = document.createElement('div');
                item.className = 'review-item ' + (ans.isCorrect ? 'review-correct' : 'review-incorrect');

                const icon = document.createElement('div');
                icon.className = 'review-icon';
                icon.textContent = ans.isCorrect ? '✅' : '❌';

                const content = document.createElement('div');
                content.className = 'review-content';

                const questionEl = document.createElement('div');
                questionEl.className = 'review-question';
                questionEl.textContent = (i + 1) + '. ' + q.question;

                const answerEl = document.createElement('div');
                answerEl.className = 'review-answer';

                if (ans.isCorrect) {
                    answerEl.innerHTML = 'Your answer: <span class="correct-answer">' + q.options[ans.selected] + '</span>';
                } else {
                    answerEl.innerHTML = 'Your answer: ' + q.options[ans.selected] +
                        ' &nbsp;|&nbsp; Correct: <span class="correct-answer">' + q.options[ans.correct] + '</span>';
                }

                content.appendChild(questionEl);
                content.appendChild(answerEl);
                item.appendChild(icon);
                item.appendChild(content);
                reviewList.appendChild(item);
            });

            // Celebration effects
            if (correctAnswers === quizData.length) {
                playSound('win');
                confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
                setTimeout(() => {
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                }, 1000);
            } else if (correctAnswers >= quizData.length * 0.85) {
                playSound('win');
                confetti({ particleCount: 100, spread: 50, origin: { y: 0.6 } });
            }

            document.getElementById('resultsScreen').classList.add('active');
        }

        // Allow Enter key to start game
        document.getElementById('playerName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startGame();
        });
    </script>
</body>
